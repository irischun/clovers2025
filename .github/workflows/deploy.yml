name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Public values (safe to expose in frontend build)
          VITE_SUPABASE_URL: https://ejcmcjjnmmioxdibypmm.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqY21jampubW1pb3hkaWJ5cG1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYzMTYzODcsImV4cCI6MjA4MTg5MjM4N30.51L3Q4kVT61MFh54zgnfcQ5TTeHj6ZWY_66sb8jb6q0

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true

  configure-pages-source:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    permissions:
      pages: write
      contents: read
    steps:
      - name: Point Pages to gh-pages branch automatically
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const source = { branch: 'gh-pages', path: '/' };

            try {
              await github.request('POST /repos/{owner}/{repo}/pages', {
                owner,
                repo,
                source,
              });
              core.info('GitHub Pages created and configured to gh-pages.');
            } catch (error) {
              if (error.status === 409 || error.status === 422) {
                await github.request('PUT /repos/{owner}/{repo}/pages', {
                  owner,
                  repo,
                  source,
                });
                core.info('GitHub Pages source updated to gh-pages.');
              } else {
                throw error;
              }
            }

